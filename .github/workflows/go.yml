name: Go Build and Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5 # Updated to v5
        with:
          go-version: '1.26'

      - name: Build
        run: go build -v -o my-app ./cmd/app # Naming the output binary

      - name: Test
        run: go test -v ./cmd/app

      # We upload the binary as an artifact so the next job can use it
      - name: Upload Build Artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: binary
          path: my-app

  release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial for creating releases/tags
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: binary

      - name: Update Rolling Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: my-app
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
