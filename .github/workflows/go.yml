name: Go Multi-Platform Release

on:
  push:
    branches: ["main"]

jobs:
  build_and_test:
    name: Build & Test (${{ matrix.os }}-${{ matrix.arch }})
    # GitHub runners use 'macos-latest', but Go uses 'darwin'
    runs-on: ${{ matrix.os == 'darwin' && 'macos-latest' || 'ubuntu-latest' }}

    strategy:
      fail-fast: true
      matrix:
        include:
          - os: linux
            arch: amd64
            binary_name: WIPCMS-linux-amd64
          - os: linux
            arch: arm64
            binary_name: WIPCMS-linux-arm64
          - os: windows
            arch: amd64
            binary_name: WIPCMS-windows-amd64.exe
          - os: windows
            arch: arm64
            binary_name: WIPCMS-windows-arm64.exe
          # Changed 'macos' to 'darwin' for the compiler
          - os: darwin
            arch: amd64
            binary_name: WIPCMS-macos-amd64
          - os: darwin
            arch: arm64
            binary_name: WIPCMS-macos-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Test
        run: go test -v ./...

      - name: Build
        env:
          GOOS: ${{ matrix.os }} # This will now correctly be 'darwin'
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: ${{ matrix.os == 'darwin' && '1' || '0' }}
        run: go build -v -o ${{ matrix.binary_name }} ./cmd/app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary_name }}
          path: ${{ matrix.binary_name }}

  release:
    needs: build_and_test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist
          merge-multiple: true

      - name: Update Rolling Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: ./dist/*
          prerelease: false
          make_latest: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
